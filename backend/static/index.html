<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Troubleshooting AI</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #1e1e1e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #header {
            padding: 20px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #header h1 {
            color: #007acc;
            margin: 0;
            font-size: 24px;
        }

        #header select {
            padding: 8px;
            width: 120px;
            border: 1px solid #555;
            border-radius: 5px;
            background-color: #2d2d2d;
            color: #ffffff;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        #chatContainer {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            margin-bottom: 10px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .messageBubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user .messageBubble {
            background-color: #007acc;
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        .bot .messageBubble {
            background-color: #2d2d2d;
            color: #ffffff;
            border-bottom-left-radius: 4px;
            border: 1px solid #444;
        }

        #inputArea {
            padding: 20px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        #inputArea select {
            padding: 12px;
            width: 120px;
            border: 1px solid #555;
            border-radius: 5px;
            background-color: #2d2d2d;
            color: #ffffff;
            font-size: 14px;
        }

        #question {
            flex: 1;
            padding: 12px;
            border: none;
            background-color: transparent;
            color: #ffffff;
            font-size: 16px;
            resize: none;
            max-height: 100px;
            margin: 0;
        }

        #question:focus {
            outline: none;
        }

        button {
            padding: 10px 20px;
            background-color: #007acc;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #005a9e;
        }

        .fileIcon {
            cursor: pointer;
            font-size: 20px;
            transition: transform 0.2s;
        }

        .fileIcon:hover {
            transform: scale(1.2);
        }

        #submitKnowledge {
            padding: 20px;
            background-color: #2d2d2d;
            border-top: 1px solid #444;
            border-radius: 8px;
            margin-top: 15px;
        }

        #submitKnowledge p {
            margin: 0 0 10px 0;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            border: 1px solid #555;
            border-radius: 5px;
            background-color: #1e1e1e;
            color: #ffffff;
            font-size: 14px;
            resize: vertical;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        textarea:focus {
            outline: none;
            border-color: #007acc;
        }

        .floatingButton {
            position: absolute;
            bottom: 100px;
            right: 20px;
            width: 50px;
            height: 50px;
            background-color: #007acc;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: background-color 0.3s, transform 0.3s;
            box-shadow: 0 4px 12px rgba(0, 122, 204, 0.3);
            z-index: 100;
        }

        .floatingButton:hover {
            background-color: #005a9e;
            transform: scale(1.1);
        }

        .generatePaymentBtn {
            padding: 12px 20px;
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #ffffff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            margin: 0 0 10px 20px;
            transition: all 0.2s;
            width: fit-content;
        }

        .generatePaymentBtn:hover {
            background-color: #ffffff;
            color: #000000;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease-in;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modalContent {
            background-color: #2d2d2d;
            border: 1px solid #555;
            border-radius: 8px;
            width: 95vw;
            max-width: 95vw;
            height: auto;
            overflow-y: visible;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modalHeader {
            padding: 20px;
            border-bottom: 1px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modalHeader h2 {
            margin: 0;
            color: #007acc;
            font-size: 20px;
        }

        .closeButton {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .closeButton:hover {
            color: #007acc;
        }

        .modalBody {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 30px;
        }

        .formColumn {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .formGroup {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .formLabel {
            flex: 0 0 150px;
            font-weight: 500;
            color: #ffffff;
            font-size: 14px;
        }

        .formInput {
            flex: 1;
            padding: 10px;
            border: 1px solid #555;
            border-radius: 5px;
            background-color: #1e1e1e;
            color: #ffffff;
            font-size: 14px;
        }

        .formInput:focus {
            outline: none;
            border-color: #007acc;
        }

        .modalFooter {
            padding: 20px;
            border-top: 1px solid #444;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .modalFooter button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .generateBtn {
            background-color: #007acc;
            color: #ffffff;
        }

        .generateBtn:hover {
            background-color: #005a9e;
        }

        .cancelBtn {
            background-color: #444;
            color: #ffffff;
        }

        .cancelBtn:hover {
            background-color: #555;
        }

        .customSelect {
            position: relative;
            width: 100%;
        }

        .selectTrigger {
            padding: 10px;
            border: 1px solid #555;
            border-radius: 5px;
            background-color: #1e1e1e;
            color: #ffffff;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .selectTrigger:after {
            content: '▼';
            font-size: 12px;
        }

        .selectOptions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: #2d2d2d;
            border: 1px solid #555;
            border-top: none;
            border-radius: 0 0 5px 5px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
        }

        .selectOptions label {
            display: block;
            padding: 8px 12px;
            cursor: pointer;
            color: #ffffff;
            border-bottom: 1px solid #444;
        }

        .selectOptions label:hover {
            background-color: #3a3a3a;
        }

        .selectOptions input[type="checkbox"] {
            margin-right: 8px;
        }

        /* Tag Input Styles */
        .tagInputContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px;
            border: 1px solid #555;
            border-radius: 5px;
            background-color: #1e1e1e;
            color: #ffffff;
            min-height: 40px;
            align-items: center;
            flex: 1;
        }

        .tagInputContainer:focus-within {
            border-color: #007acc;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: #007acc;
            color: #ffffff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 13px;
            white-space: nowrap;
            animation: tagSlideIn 0.2s ease-out;
        }

        @keyframes tagSlideIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .tagRemoveBtn {
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: transform 0.2s;
        }

        .tagRemoveBtn:hover {
            transform: scale(1.2);
        }

        .tagInputField {
            flex: 1;
            border: none;
            background-color: transparent;
            color: #ffffff;
            outline: none;
            font-size: 14px;
            min-width: 150px;
        }

        .tagInputField::placeholder {
            color: #888;
        }

        /* Mix File Styles */
        .mixFileContainer {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-left: 20px;
        }

        .mixFileCheckbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .mixFileCheckbox input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .mixFileCheckbox label {
            cursor: pointer;
            color: #ffffff;
            font-size: 14px;
            margin: 0;
        }

        .mixFileDropdowns {
            display: flex;
            flex-direction: row;
            gap: 10px;
            align-items: flex-end;
        }

        .mixFileDropdowns select {
            padding: 8px;
            border: 1px solid #555;
            border-radius: 5px;
            background-color: #2d2d2d;
            color: #ffffff;
            font-size: 14px;
        }

        .mixFileDropdowns button {
            padding: 8px 12px;
            background-color: #007acc;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: background-color 0.2s;
        }

        .mixFileDropdowns button:hover {
            background-color: #005a9e;
        }

        .mixFileDropdowns button.removeBtn {
            background-color: #c41e3a;
        }

        .mixFileDropdowns button.removeBtn:hover {
            background-color: #a01830;
        }

        #mixFile3Container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .buttonContainer {
            display: flex;
            gap: 10px;
            padding: 20px;
            border-top: 1px solid #333;
        }

        /* Drop File Modal Styles */
        #dropFileModal .modalContent {
            width: calc(100vw - 40px);
            height: calc(100vh - 40px);
            max-width: none;
            display: flex;
            flex-direction: column;
        }

        .authContainer {
            display: flex;
            gap: 10px;
            align-items: center;
            position: relative;
        }

        .connectBtn {
            background-color: #007acc;
            color: #ffffff;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .connectBtn:hover {
            background-color: #005a9e;
        }

        .connectBtn.connected {
            background-color: green;
        }

        .userIconBtn {
            background: none;
            border: 1px solid #ffffff;
            color: #ffffff;
            min-width: 72px;
            height: 36px;
            border-radius: 4px;
            padding: 0 12px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.3px;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .userIconBtn:hover,
        .userIconBtn.active {
            border-color: #ffffff;
            background-color: #007acc;
        }

        .userLoginPopup {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            width: 460px;
            max-width: min(460px, calc(100vw - 90px));
            display: none;
            background-color: #262626;
            border: 1px solid #555;
            border-radius: 8px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.45);
            padding: 12px;
            z-index: 2200;
        }

        .userLoginPopup.show {
            display: block;
        }

        .connectionInfoPopup {
            width: 620px;
            max-width: min(620px, calc(100vw - 90px));
            max-height: min(78vh, 760px);
            overflow-y: auto;
        }

        .userLoginPopupHeader {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .userLoginPopupHeader h4 {
            margin: 0;
            font-size: 15px;
            color: #ffffff;
        }

        .userLoginPopupClose {
            background: none;
            border: none;
            color: #cfcfcf;
            font-size: 18px;
            width: 24px;
            height: 24px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .userLoginPopupClose:hover {
            color: #ffffff;
            background: none;
        }

        .loginCredentialBlock {
            border: 1px solid #444;
            border-radius: 6px;
            padding: 10px;
            margin-top: 10px;
        }

        .loginCredentialBlock.hidden {
            display: none;
        }

        .loginCredentialBlock h5 {
            margin: 0 0 8px 0;
            color: #9fd4ff;
            font-size: 13px;
            font-weight: 600;
        }

        .loginFieldRow {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .loginFieldGroup {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .loginFieldGroup label {
            color: #d0d0d0;
            font-size: 12px;
            font-weight: 500;
        }

        .loginFieldGroup input {
            width: 100%;
            padding: 8px;
            border: 1px solid #555;
            border-radius: 4px;
            background-color: #1e1e1e;
            color: #ffffff;
            font-size: 13px;
        }

        .sameCredentialsRow {
            margin-top: 10px;
            padding: 4px 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sameCredentialsRow input[type="checkbox"] {
            width: 15px;
            height: 15px;
            margin: 0;
            cursor: pointer;
        }

        .sameCredentialsRow label {
            color: #d8d8d8;
            font-size: 13px;
            cursor: pointer;
        }

        .loginPopupFooter {
            margin-top: 12px;
            display: flex;
            justify-content: center;
        }

        .loginPopupSaveBtn {
            min-width: 100px;
            padding: 8px 18px;
            font-size: 13px;
        }

        .connectionInfoSections {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .connectionInfoSection {
            border: 1px solid #444;
            border-radius: 6px;
            padding: 12px;
            background-color: #212121;
        }

        .connectionSectionHeader {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }

        .connectionSectionHeader h5 {
            margin: 0;
            color: #9fd4ff;
            font-size: 13px;
            font-weight: 600;
        }

        .connectionSectionActions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .connectionSectionBtn {
            min-width: 56px;
            height: 28px;
            padding: 0 12px;
            font-size: 12px;
            border-radius: 4px;
        }

        .connectionSectionBtn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .connectionInfoFields {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .connectionInfoFieldRow {
            display: grid;
            grid-template-columns: max-content max-content max-content;
            gap: 10px;
            align-items: end;
            justify-content: start;
        }

        .connectionInfoFieldGroup {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
            align-items: flex-start;
        }

        .connectionInfoFieldGroup label {
            color: #d0d0d0;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
        }

        .connectionInfoFieldGroup input,
        .connectionInfoFieldGroup select {
            width: auto;
            padding: 8px;
            border: 1px solid #555;
            border-radius: 4px;
            background-color: #1e1e1e;
            color: #ffffff;
            font-size: 13px;
        }

        .connectionInfoFieldGroup.protocolField select {
            width: 128px;
        }

        .connectionInfoFieldGroup.portField input {
            width: 88px;
        }

        .connectionInfoFieldGroup.hostField input {
            width: 220px;
        }

        .connectionInfoFieldGroup input[readonly],
        .connectionInfoFieldGroup select:disabled {
            color: #bcbcbc;
            background-color: #191919;
            cursor: default;
        }

        /* Drop File Modal Body Vertical Division */
        .dropFileModalBody {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 0;
            padding: 0;
            flex: 1;
            min-height: 0;
        }

        .dropFileSection {
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 100%;
            min-height: 0;
            min-width: 0;
        }

        .directoryNavBar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #444;
            margin-bottom: 8px;
        }

        .directoryBackBtn {
            padding: 4px 10px;
            border: 1px solid #555;
            background-color: #262626;
            color: #fff;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
        }

        .directoryBackBtn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .directoryPathText {
            color: #bdbdbd;
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
            min-width: 0;
        }

        .directoryPathSegment {
            border: none;
            background: transparent;
            color: #bdbdbd;
            font-size: 12px;
            padding: 0;
            cursor: pointer;
            white-space: nowrap;
        }

        .directoryPathSegment:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        .directoryPathSegment.current {
            color: #ffffff;
            cursor: default;
            text-decoration: none;
        }

        .directoryPathSeparator {
            color: #777;
            user-select: none;
        }

        .dropFileSection:first-child {
            border-right: 1px solid #555;
        }

        .dropFileSectionHeader {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 0 0 10px 0;
            padding-bottom: 10px;
            border-bottom: 1px solid #555;
        }

        .dropFileSectionHeader h3 {
            margin: 0;
            color: #007acc;
            font-size: 16px;
            font-weight: 600;
        }

        .fontSizeControls {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .directoryActionBtn {
            background: none;
            border: 1px solid #555;
            color: #ccc;
            border-radius: 4px;
            min-width: 28px;
            height: 22px;
            font-size: 13px;
            line-height: 1;
            cursor: pointer;
            padding: 0 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.15s, color 0.15s;
        }

        .directoryActionBtn:hover {
            background-color: #3a3a3a;
            color: #fff;
        }

        .fontSizeBtn {
            width: 22px;
            font-size: 15px;
            padding: 0;
        }

        .fontSizeLabel {
            color: #888;
            font-size: 11px;
            min-width: 28px;
            text-align: center;
        }

        .directoryTreeContainer {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 8px;
            font-size: 15px;
        }

        .directoryTreeLoading,
        .directoryTreeEmpty,
        .directoryTreeError,
        .directoryStatus {
            color: #d0d0d0;
            font-size: 13px;
            line-height: 1.5;
        }

        .directoryTreeError {
            color: #ff8a8a;
        }

        .directoryTreeNode {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 6px;
            border-radius: 4px;
            cursor: pointer;
            color: #f0f0f0;
            user-select: none;
            min-width: 0;
        }

        .directoryTreeNode:hover {
            background-color: #3a3a3a;
        }

        .directoryTreeNode.directoryUpNode {
            color: #9dc4ff;
        }

        .directoryTreeNode.fileNode {
            color: #d8d8d8;
        }

        .directoryTreeNode.fileNode:hover {
            background-color: #323232;
        }

        .nodeCaret {
            width: 12px;
            text-align: center;
            color: #a6a6a6;
            font-size: 11px;
            flex-shrink: 0;
        }

        .nodeCaret.expanded {
            transform: rotate(90deg);
        }

        .nodeLabel {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }

        .directoryTreeChildren {
            margin-left: 16px;
        }
    </style>
</head>

    <script>
        let lastAnswerContainsNoInfo = false;

        function addMessage(text, isUser = false) {
            const chatContainer = document.getElementById('chatContainer');
            const message = document.createElement('div');
            message.className = `message ${isUser ? 'user' : 'bot'}`;

            const bubble = document.createElement('div');
            bubble.className = 'messageBubble';
            bubble.textContent = text;

            message.appendChild(bubble);
            chatContainer.appendChild(message);

            // Auto-scroll to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function askQuestion() {
            const project = document.getElementById('project').value;
            const question = document.getElementById('question').value.trim();

            if (!question) return;

            // Add user message to chat
            addMessage(question, true);

            // Clear input
            document.getElementById('question').value = '';

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ project, question })
                });
                const data = await response.json();

                // Add bot message to chat
                addMessage(data.answer, false);

                // Show knowledge submission if needed
                lastAnswerContainsNoInfo = data.answer.includes("don't have specific information");
                if (lastAnswerContainsNoInfo) {
                    document.getElementById('submitKnowledge').style.display = 'block';
                } else {
                    document.getElementById('submitKnowledge').style.display = 'none';
                }
            } catch (error) {
                addMessage('Error: Unable to get response', false);
            }
        }

        async function submitKnowledge() {
            const project = document.getElementById('project').value;
            const knowledge = document.getElementById('knowledge').value.trim();

            if (!knowledge) return;

            try {
                const response = await fetch('/submit-knowledge', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ project, knowledge })
                });
                const data = await response.json();

                // Add success message to chat
                addMessage(data.message, false);

                // Clear textarea
                document.getElementById('knowledge').value = '';
                document.getElementById('submitKnowledge').style.display = 'none';
            } catch (error) {
                addMessage('Error: Unable to submit knowledge', false);
            }
        }

        // Add event listener for Enter key on question input
        document.getElementById('question').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                askQuestion();
            }
        });

        // File Generation Modal Functions
        const generateModal = document.getElementById('generateModal');

        function openGenerateModal() {
            generateModal.classList.add('show');
            loadFormFields();
            // Add event listener for file type change
            document.getElementById('fileTypeSelect').addEventListener('change', loadFormFields);
        }

        function closeGenerateModal() {
            generateModal.classList.remove('show');
            // Reset Mix File checkbox when modal is closed
            document.getElementById('mixFileCheckbox').checked = false;
            document.getElementById('mixFileDropdowns').style.display = 'none';
            document.getElementById('mixFile3Container').style.display = 'none';
            document.getElementById('mixFileAddBtn').textContent = 'Add';
        }

        // Mix File checkbox event listener
        document.getElementById('mixFileCheckbox').addEventListener('change', function() {
            const mixFileDropdowns = document.getElementById('mixFileDropdowns');
            const mixFile3Container = document.getElementById('mixFile3Container');
            const addBtn = document.getElementById('mixFileAddBtn');

            if (this.checked) {
                mixFileDropdowns.style.display = 'flex';
                mixFile3Container.style.display = 'none';
                addBtn.style.display = 'inline-block';
                addBtn.textContent = 'Add';
            } else {
                mixFileDropdowns.style.display = 'none';
                mixFile3Container.style.display = 'none';
                addBtn.style.display = 'inline-block';
                addBtn.textContent = 'Add';
            }
        });

        function addMixFileDropdown() {
            const mixFile3Container = document.getElementById('mixFile3Container');
            const addBtn = document.getElementById('mixFileAddBtn');

            if (mixFile3Container.style.display === 'none') {
                mixFile3Container.style.display = 'flex';
                addBtn.textContent = 'Add';
                addBtn.style.display = 'none';
            }
        }

        function removeMixFileDropdown() {
            const mixFile3Container = document.getElementById('mixFile3Container');
            const addBtn = document.getElementById('mixFileAddBtn');

            mixFile3Container.style.display = 'none';
            addBtn.textContent = 'Add';
            addBtn.style.display = 'inline-block';

        function loadFormFields() {
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = '';

            const fileType = document.getElementById('fileTypeSelect').value;

            let fields = [];

                        { value: 'Descending', label: 'Descending' },

            // Add new fields to middle column

            middleColumn.appendChild(lookupElementsGroup);

            if (!isCheckForm) {

        async function generateFile() {
            const inputs = document.querySelectorAll('#modalBody .formInput, #modalBody input[type="hidden"]');
            const tagContainers = document.querySelectorAll('#modalBody .tagInputContainer');
            const fileType = document.getElementById('fileTypeSelect').value;
            const data = { fileType: fileType };

            // Collect regular input values
            inputs.forEach(input => {
                if (input.name) {
                    data[input.name] = input.value;
                }
            });

            // Collect tag input values
            tagContainers.forEach(container => {
                const fieldName = container.dataset.fieldName;
                const tags = JSON.parse(container.dataset.tags || '[]');
                data[fieldName] = tags.join(',');
            });

            try {
                const response = await fetch('/generate-xml', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;

                    // Generate filename: usergroup_bank_ACHXML_date_time.xml
                    const userGroup = data.clientCompany || 'UNKNOWN';
                    const bankName = data.bankName || 'UNKNOWN';
                    const now = new Date();
                    const date = now.toISOString().split('T')[0].replace(/-/g, '');
                    const time = now.toTimeString().split(' ')[0].replace(/:/g, '');
                    const filename = `${userGroup}_${bankName}_ACHXML_${date}_${time}.xml`;

                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);

                    // Show success popup
                    showSuccessPopup(filename);
                    closeGenerateModal();
                } else {
                    const errorData = await response.json();
                    addMessage(`Error: ${errorData.error || 'Unable to generate file'}`, false);
                }
            } catch (error) {
                addMessage(`Error: ${error.message}`, false);
            }
        }

        // Create tag input field
        function createTagInput(fieldName, placeholder = 'Enter values separated by commas', allowDuplicates = false) {
            const container = document.createElement('div');
            container.className = 'tagInputContainer';
            container.dataset.fieldName = fieldName;
            container.style.cursor = 'text';

            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'tagInputField';
            input.placeholder = placeholder;
            input.dataset.fieldName = fieldName;

            // Track the tags
            let tags = [];

            // Handle input
            input.addEventListener('keydown', function(e) {
                if (e.key === ',' || e.key === 'Enter') {
                    e.preventDefault();
                    const value = this.value.trim().replace(/,+$/, '').trim();
                    if (value) {
                        addTag(value);
                        this.value = '';
                    }
                }
            });

            // Handle paste
            input.addEventListener('paste', function(e) {
                setTimeout(() => {
                    let value = this.value.trim();
                    const values = value.split(',').map(v => v.trim()).filter(v => v);
                    if (values.length > 1) {
                        this.value = values[values.length - 1];
                        values.slice(0, -1).forEach(v => addTag(v));
                    }
                }, 10);
            });

            function addTag(text) {
                if (!text) return;

                // Check for duplicates only if duplicates are not allowed
                if (!allowDuplicates && tags.includes(text)) return;

                tags.push(text);

                const tag = document.createElement('span');
                tag.className = 'tag';

                const tagText = document.createElement('span');
                tagText.textContent = text;

                const removeBtn = document.createElement('span');
                removeBtn.className = 'tagRemoveBtn';
                removeBtn.textContent = '×';
                removeBtn.style.cursor = 'pointer';

                removeBtn.addEventListener('click', function() {
                    const index = tags.indexOf(text);
                    if (index > -1) {
                        tags.splice(index, 1);
                    }
                    tag.remove();
                    input.focus();
                    updateHiddenInput();
                });

                tag.appendChild(tagText);
                tag.appendChild(removeBtn);
                container.insertBefore(tag, input);

                updateHiddenInput();
            }

            function updateHiddenInput() {
                // Store tags in a data attribute that can be read later
                container.dataset.tags = JSON.stringify(tags);
            }

            // Allow clicking on container to focus input
            container.addEventListener('click', function() {
                input.focus();
            });

            container.appendChild(input);
            return container;
        }

        // Adding functionality for Drop File button and modal
        const DropFileModule = {
            dropModal: null,
            treeContainer: null,
            detailsContainer: null,
            backButton: null,
            refreshButton: null,
            pathText: null,
            rootPath: '',
            currentPath: '',
            lastSuccessfulData: null,

            init() {
                this.dropModal = document.getElementById('dropFileModal');
                this.treeContainer = document.getElementById('directoryTreeContainer');
                this.detailsContainer = document.getElementById('directoryDetails');
                this.backButton = document.getElementById('directoryBackBtn');
                this.refreshButton = document.getElementById('directoryRefreshBtn');
                this.pathText = document.getElementById('directoryPathText');
                this.setupEventListeners();
            },

            setupEventListeners() {
                const closeDropFileModal = document.getElementById('closeDropFileModal');

                if (closeDropFileModal) {
                    closeDropFileModal.addEventListener('click', this.closeModal.bind(this));
                }

                if (this.backButton) {
                    this.backButton.addEventListener('click', async () => {
                        const parentPath = this.getParentPath();

                            return;
                        }
                        this.treeContainer.innerHTML = '<div class="directoryTreeLoading">Loading directory...</div>';
                        await this.loadDirectory(parentPath, this.treeContainer);
                    });

                        }
                        this.treeContainer.innerHTML = '<div class="directoryTreeLoading">Loading directory...</div>';
                        await this.loadDirectory(this.currentPath || '', this.treeContainer);
                    });
                }

                if (this.pathText) {
                    this.pathText.addEventListener('click', async (event) => {
                        const segment = event.target.closest('.directoryPathSegment[data-target-path]');
                        if (!segment || !this.treeContainer) {
                            return;
                        }

                        const targetPath = segment.dataset.targetPath;
                        if (!targetPath || targetPath === this.currentPath) {
                            return;
                        }

                        this.treeContainer.innerHTML = '<div class="directoryTreeLoading">Loading directory...</div>';
                        await this.loadDirectory(targetPath, this.treeContainer);
                    });
                }

                window.addEventListener('click', (event) => {
                    if (event.target === this.dropModal) {
                        this.closeModal();
                    }
                });
            },

            async openModal() {
                if (!this.dropModal) {
                    return;
                }
                this.dropModal.classList.add('show');
                await this.loadRootDirectory();
            },

            closeModal() {
                if (!this.dropModal) {
                    return;
                }
                this.dropModal.classList.remove('show');
            },

            async loadRootDirectory() {
                if (!this.treeContainer) {
                    return;
                }
                this.treeContainer.innerHTML = '<div class="directoryTreeLoading">Loading directory...</div>';
                this.updateDetails('Loading Users directory...');
                await this.loadDirectory('', this.treeContainer);
            },

            async loadDirectory(pathValue, targetContainer) {
                try {
                    const query = pathValue ? `?path=${encodeURIComponent(pathValue)}` : '';
                    const response = await fetch(`/api/directory-tree${query}`);
                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || 'Unable to load directory.');
                    }

                    this.currentPath = data.path || '';
                    this.rootPath = data.rootPath || this.rootPath;
                    this.lastSuccessfulData = data;
                    this.renderDirectoryList(data, targetContainer);

                    this.updateDetails(`Current path: ${this.currentPath}`);
                } catch (error) {
                    if (this.lastSuccessfulData) {
                        this.currentPath = this.lastSuccessfulData.path || this.currentPath;
                        this.rootPath = this.lastSuccessfulData.rootPath || this.rootPath;
                        this.renderDirectoryList(this.lastSuccessfulData, targetContainer);
                    } else {
                        targetContainer.innerHTML = `<div class="directoryTreeError">${error.message}</div>`;
                    }
                    this.updateDetails(`Error: ${error.message}`);
                    this.updatePathHeader();
                }
            },

            renderDirectoryList(data, targetContainer) {
                targetContainer.innerHTML = '';
                this.updatePathHeader();

                if (data.parentPath) {
                    const upNode = this.createNavigationNode('.. (Up one level)', data.parentPath, true);
                    targetContainer.appendChild(upNode);
                }

                if (!data.entries || data.entries.length === 0) {
                    targetContainer.innerHTML += '<div class="directoryTreeEmpty">No files or folders found.</div>';
                    return;
                }

                data.entries.forEach((entry) => {
                    const item = this.createEntryNode(entry);
                    targetContainer.appendChild(item);
                });
            },

            createNavigationNode(label, nextPath, isUpRow) {
                const nodeRow = document.createElement('div');
                nodeRow.className = 'directoryTreeNode';
                if (isUpRow) {
                    nodeRow.classList.add('directoryUpNode');
                }

                const icon = document.createElement('span');
                icon.className = 'nodeCaret';
                icon.textContent = isUpRow ? '^' : '>';

                const nodeLabel = document.createElement('span');
                nodeLabel.className = 'nodeLabel';
                nodeLabel.textContent = label;
                nodeLabel.title = nextPath;

                nodeRow.appendChild(icon);
                nodeRow.appendChild(nodeLabel);
                nodeRow.addEventListener('click', async () => {
                    this.treeContainer.innerHTML = '<div class="directoryTreeLoading">Loading directory...</div>';
                    await this.loadDirectory(nextPath, this.treeContainer);
                });

                return nodeRow;
            },

            createEntryNode(entry) {
                const isDirectory = entry.entryType === 'directory';
                const nodeRow = document.createElement('div');
                nodeRow.className = `directoryTreeNode${isDirectory ? '' : ' fileNode'}`;

                const icon = document.createElement('span');
                icon.className = 'nodeCaret';
                icon.textContent = isDirectory ? '>' : '•';

                const nodeLabel = document.createElement('span');
                nodeLabel.className = 'nodeLabel';
                nodeLabel.textContent = entry.name;
                nodeLabel.title = entry.path;

                nodeRow.appendChild(icon);
                nodeRow.appendChild(nodeLabel);

                if (isDirectory) {
                    nodeRow.addEventListener('click', async () => {
                        this.treeContainer.innerHTML = '<div class="directoryTreeLoading">Loading directory...</div>';
                        await this.loadDirectory(entry.path, this.treeContainer);
                    });
                } else {
                    nodeRow.addEventListener('click', () => {
                        this.updateDetails(`File: ${entry.path}`);
                    });
                }

                return nodeRow;
            },

            updateDetails(text) {
                if (this.detailsContainer) {
                    this.detailsContainer.textContent = text;
                }
            },

            updatePathHeader() {
                if (this.pathText) {
                    const pathValue = this.currentPath || this.rootPath || '';
                    this.pathText.innerHTML = '';
                    this.pathText.title = pathValue;

                    const crumbs = this.buildPathCrumbs(pathValue);
                    crumbs.forEach((crumb, index) => {
                        if (index > 0) {
                            const separator = document.createElement('span');
                            separator.className = 'directoryPathSeparator';
                            separator.textContent = '\\';
                            this.pathText.appendChild(separator);
                        }

                        const crumbNode = document.createElement('button');
                        crumbNode.type = 'button';
                        crumbNode.className = 'directoryPathSegment';
                        crumbNode.textContent = crumb.label;
                        crumbNode.dataset.targetPath = crumb.path;
                        if (crumb.path === this.currentPath) {
                            crumbNode.classList.add('current');
                        }
                        this.pathText.appendChild(crumbNode);
                    });
                }
                if (this.backButton) {
                    this.backButton.disabled = !this.getParentPath();
                }
            },

            buildPathCrumbs(pathValue) {
                if (!pathValue) {
                    return [];
                }

                const normalizePath = (value) => value.replace(/\//g, '\\\\').replace(/\\+$/, '');
                const root = normalizePath(this.rootPath || pathValue);
                const current = normalizePath(pathValue);

                if (!current.toLowerCase().startsWith(root.toLowerCase())) {
                    return [{ label: current, path: current }];
                }

                const crumbs = [{ label: root, path: root }];
                const remainder = current.slice(root.length).replace(/^\\+/, '');
                if (!remainder) {
                    return crumbs;
                }

                let running = root;
                remainder.split('\\').filter(Boolean).forEach((segment) => {
                    running = `${running}\\${segment}`;
                    crumbs.push({ label: segment, path: running });
                });

                return crumbs;
            },

            getParentPath() {
                if (!this.currentPath || !this.rootPath) {
                    return null;
                }
                const normalizedCurrent = this.currentPath.toLowerCase();
                const normalizedRoot = this.rootPath.toLowerCase();
                if (normalizedCurrent === normalizedRoot) {
                    return null;
                }
                const lastSlashIndex = Math.max(this.currentPath.lastIndexOf('\\'), this.currentPath.lastIndexOf('/'));
                if (lastSlashIndex <= 0) {
                    return null;
                }
                const parentPath = this.currentPath.slice(0, lastSlashIndex);
                if (!parentPath || parentPath.toLowerCase().length < normalizedRoot.length) {
                    return null;
                }
                return parentPath;
            }
        };

                if (decreaseBtn) decreaseBtn.disabled = currentDirFontSize <= MIN_FONT;

            }

            const decreaseBtn = document.getElementById('dirFontDecrease');
            const increaseBtn = document.getElementById('dirFontIncrease');
            if (decreaseBtn) decreaseBtn.addEventListener('click', () => applyDirFontSize(currentDirFontSize - 1));

                     input.disabled = !isEditable;
                 } else {
                     input.readOnly = !isEditable;
                 }
             });

             if (editBtn) {
                 editBtn.disabled = isEditable;
             }
             if (saveBtn) {
                 saveBtn.disabled = !isEditable;
             }
         }

         function closeConnectionInfoPopup() {
             if (connectionInfoPopup) {
                 connectionInfoPopup.classList.remove('show');
             }
             if (connectionInfoBtn) {
                 connectionInfoBtn.classList.remove('active');
             }
         }

         function toggleConnectionInfoPopup() {
             if (!connectionInfoPopup || !connectionInfoBtn) {
                 return;
             }
             const shouldShow = !connectionInfoPopup.classList.contains('show');
             closeUserLoginPopup();
             connectionInfoPopup.classList.toggle('show', shouldShow);
             connectionInfoBtn.classList.toggle('active', shouldShow);
         }

         function toggleUserLoginPopup() {
             if (!userLoginPopup || !userLoginIconBtn) {
                 return;
             }
             const shouldShow = !userLoginPopup.classList.contains('show');
             closeConnectionInfoPopup();
             userLoginPopup.classList.toggle('show', shouldShow);
             userLoginIconBtn.classList.toggle('active', shouldShow);
         }

         // Connect button for Drop File modal
         if (connectBtn) {
             connectBtn.addEventListener('click', function() {
                 if (this.textContent === 'CONNECT') {
                     this.textContent = 'CONNECTED';
                     this.classList.add('connected');
                 } else {
                     this.textContent = 'CONNECT';
                     this.classList.remove('connected');
                 }
             });
         }

         if (userLoginIconBtn) {
             userLoginIconBtn.addEventListener('click', function(event) {
                 event.stopPropagation();
                 applySameCredentialsState();
                 toggleUserLoginPopup();
             });
         }

         if (userLoginPopupClose) {
             userLoginPopupClose.addEventListener('click', function() {
                 closeUserLoginPopup();
             });
         }

         if (userLoginPopup) {
             userLoginPopup.addEventListener('click', function(event) {
                 event.stopPropagation();
             });
         }

         if (connectionInfoBtn) {
             connectionInfoBtn.addEventListener('click', function(event) {
                 event.stopPropagation();
                 toggleConnectionInfoPopup();
             });
         }

         if (connectionInfoPopupClose) {
             connectionInfoPopupClose.addEventListener('click', function() {
                 closeConnectionInfoPopup();
             });
         }

         if (connectionInfoPopup) {
             connectionInfoPopup.addEventListener('click', function(event) {
                 event.stopPropagation();
             });

             connectionInfoPopup.querySelectorAll('[data-connection-section]').forEach((section) => {
                 setConnectionSectionEditable(section, false);

                 const editBtn = section.querySelector('[data-section-edit]');
                 const saveBtn = section.querySelector('[data-section-save]');
                 const portInputs = section.querySelectorAll('input[type="number"]');

                 if (editBtn) {
                     editBtn.addEventListener('click', function() {
                         setConnectionSectionEditable(section, true);
                     });
                 }

                 if (saveBtn) {
                     saveBtn.addEventListener('click', function() {
                         setConnectionSectionEditable(section, false);
                     });
                 }

                 portInputs.forEach((input) => {
                     input.addEventListener('input', function() {
                         this.value = this.value.replace(/\D/g, '');
                     });
                 });
             });
         }

         if (sameCredentialsCheckbox) {
             sameCredentialsCheckbox.addEventListener('change', applySameCredentialsState);
             applySameCredentialsState();
         }

         if (userLoginSaveBtn) {
             userLoginSaveBtn.addEventListener('click', function() {
                 closeUserLoginPopup();
             });
         }

         document.addEventListener('click', function() {
             closeUserLoginPopup();
             closeConnectionInfoPopup();
         });
    </script>
</body>
</html>
