<!-- Adding Drop File button next to Generate Payment File button -->
<div class="buttonContainer">
    <button id="generatePaymentFileBtn" class="generatePaymentBtn">Generate Payment File</button>
    <button id="dropFileBtn" class="generatePaymentBtn">Drop File</button>
</div>

<!-- Adding Drop File Modal -->
<div id="dropFileModal" class="modal">
    <div class="modalContent">
        <div class="modalHeader">
            <h2>Drop File</h2>
            <button class="closeButton" id="closeDropFileModal">&times;</button>
        </div>
        <div class="modalBody dropFileModalBody">
            <div class="dropFileSection">
                <h3>Upload File</h3>
                <p style="color: white; text-align: center;">Drop your file here or click to upload.</p>
            </div>
            <div class="dropFileSection">
                <h3>File Details</h3>
                <p style="color: white; text-align: center;">File information will appear here.</p>
            </div>
        </div>
    </div>
</div>
